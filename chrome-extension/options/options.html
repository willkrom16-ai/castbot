<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CastBot — Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafafa;
      color: #18181b;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px;
    }
    .card {
      background: #fff;
      border: 1px solid #e4e4e7;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 440px;
    }
    h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
    .sub { font-size: 14px; color: #71717a; margin-bottom: 28px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #18181b; margin-bottom: 6px; }
    .hint { font-size: 12px; color: #71717a; margin-top: 4px; line-height: 1.5; }
    input[type="text"], input[type="url"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #e4e4e7;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #18181b;
      outline: none;
      transition: border-color 0.15s;
      background: #fff;
    }
    input:focus { border-color: #18181b; }
    .field { margin-bottom: 20px; }
    .actions { margin-top: 28px; display: flex; gap: 10px; }
    button {
      padding: 9px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.15s;
      letter-spacing: -0.01em;
    }
    .btn-primary { background: #18181b; color: #fff; }
    .btn-primary:hover { background: #27272a; }
    .btn-outline { background: #fff; color: #18181b; border-color: #e4e4e7; }
    .btn-outline:hover { background: #f4f4f5; }
    .status {
      margin-top: 14px;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      display: none;
    }
    .status.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; display: block; }
    .status.error { background: #fff1f2; color: #be123c; border: 1px solid #fecdd3; display: block; }
    .divider { border: none; border-top: 1px solid #f4f4f5; margin: 24px 0; }
    .advanced-toggle {
      background: none; border: none; padding: 0;
      font-size: 12px; color: #71717a; cursor: pointer;
      text-decoration: underline; text-underline-offset: 3px;
    }
    #advanced { display: none; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>CastBot</h1>
    <p class="sub">Configure your extension to connect to your CastBot account.</p>

    <div class="field">
      <label for="token">CastBot token</label>
      <input type="text" id="token" placeholder="Paste your token here" autocomplete="off" spellcheck="false" />
      <p class="hint">
        Find your token on the CastBot app under Profile → Extension token.
        This is the same UUID used for your email inbox.
      </p>
    </div>

    <hr class="divider" />

    <button class="advanced-toggle" id="advanced-toggle">Advanced settings</button>
    <div id="advanced">
      <div class="field" style="margin-top:16px">
        <label for="api-url">CastBot API URL</label>
        <input type="url" id="api-url" placeholder="https://your-castbot-app.vercel.app" />
        <p class="hint">Only change this if you self-host CastBot.</p>
      </div>
    </div>

    <div class="actions">
      <button class="btn-primary" id="save-btn">Save</button>
      <button class="btn-outline" id="clear-btn">Clear</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
